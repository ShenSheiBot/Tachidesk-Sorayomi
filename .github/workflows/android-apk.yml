name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - shensheibot-reader-fixes
    tags:
      - "reader-fixes-*"
    paths-ignore:
      - .github/workflows/android-apk.yml

jobs:
  build:
    name: Build Android APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter doctor -v
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Configure Android signing
        working-directory: android
        run: |
          echo "${{ secrets.PLAY_STORE_UPLOAD_KEY }}" | base64 --decode > app/upload-keystore.jks
          {
            echo "storeFile=upload-keystore.jks"
            echo "keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}"
            echo "storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}"
          } > key.properties

      - name: Build APKs
        run: |
          flutter build apk --release
          flutter build apk --split-per-abi --release

      - name: Collect APKs
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/tachidesk-sorayomi-android-all.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/tachidesk-sorayomi-android-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/tachidesk-sorayomi-android-armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk dist/tachidesk-sorayomi-android-x86_64.apk
          cd dist
          sha256sum *.apk > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: tachidesk-sorayomi-android-apks
          path: dist/*

      - name: Verify ShenSheiBot release token
        if: startsWith(github.ref, 'refs/tags/reader-fixes-')
        env:
          RELEASE_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: test -n "$RELEASE_TOKEN"

      - name: Publish Android release
        if: startsWith(github.ref, 'refs/tags/reader-fixes-')
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          version="$(sed -n 's/^version: \([^+]*\).*/\1/p' pubspec.yaml)"
          previous_tag="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"
          {
            echo "Unofficial Android APK build from ShenSheiBot/Tachidesk-Sorayomi."
            echo
            echo "Version: ${version}"
            echo "Commit: ${GITHUB_SHA}"
            echo "GitHub Actions run: ${GITHUB_RUN_ID}"
            echo
            echo "Changes:"
            if [ -n "$previous_tag" ]; then
              git log --pretty='- %s' "${previous_tag}..HEAD"
            else
              git log -1 --pretty='- %s'
            fi
            echo
            echo "APKs are signed with the ShenSheiBot fork signing key and cannot update the official Suwayomi/Tachidesk-Sorayomi app in place."
          } > release-notes.md
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Reader fixes ${version} Android APK" \
            --notes-file release-notes.md
